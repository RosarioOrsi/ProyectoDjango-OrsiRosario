<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Empresa de Transporte</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #111; color: #fff; font-family: Arial, sans-serif; }
        nav { background: #1a1a1a; padding: 15px 30px; border-bottom: 2px solid #c0392b; display: flex; align-items: center; gap: 20px; }
        nav a { color: #fff; text-decoration: none; font-size: 15px; }
        nav a:hover { color: #e74c3c; }
        .container { padding: 30px; }
        .btn { background: #c0392b; color: #fff; padding: 10px 20px; border: none; cursor: pointer; border-radius: 4px; text-decoration: none; font-size: 14px; display: inline-block; }
        .btn:hover { background: #e74c3c; }
        .btn-gris { background: #3a3a3a; }
        .btn-gris:hover { background: #555; }
        input[type=text], input[type=email], select { padding: 8px; border-radius: 4px; border: 1px solid #c0392b; background: #222; color: #fff; }
        label { display: block; margin: 10px 0 5px; color: #ccc; }
        input, select { width: 100%; padding: 8px; background: #222; color: #fff; border: 1px solid #555; border-radius: 4px; margin-bottom: 10px; }
        h1, h2, h3 { color: #fff; }
        p { color: #ccc; }
    </style>
</head>
<body>
    <nav>
        <a href="/">🚛 Transporte</a>
        <a href="/agregar-viaje/">+ Viaje</a>
        <a href="/agregar-chofer/">+ Chofer</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
